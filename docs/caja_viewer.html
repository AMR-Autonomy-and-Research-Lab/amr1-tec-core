<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CajaNuevaAMRF2 — Visor 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; color: #eee; font-family: system-ui, sans-serif; }
    header { padding: 1rem; text-align: center; background: #16213e; }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { font-size: 0.85rem; opacity: 0.8; margin-top: 0.25rem; }
    #canvas-container { flex: 1; min-height: 400px; position: relative; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    .controls { padding: 1rem; text-align: center; font-size: 0.8rem; opacity: 0.9; }
    .controls span { display: inline-block; margin: 0 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>CajaNuevaAMRF2 · Base para montaje de PCB</h1>
    <p>Diseño_CAJA — Arrastra para rotar · Scroll para zoom</p>
  </header>
  <div id="canvas-container"></div>
  <div class="controls">
    <span>🖱️ Arrastrar = rotar</span>
    <span>🔍 Scroll = zoom in/out</span>
    <span>🖱️ Clic derecho + arrastrar = pan</span>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 50, 200);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(80, 60, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 20;
    controls.maxDistance = 300;
    controls.maxPolarAngle = Math.PI / 2;
    controls.rotateSpeed = 0.8;

    // Luz ambiente + direccional
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const dir = new THREE.DirectionalLight(0xffffff, 0.9);
    dir.position.set(50, 80, 50);
    dir.castShadow = true;
    scene.add(dir);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.3);
    fill.position.set(-30, 40, -30);
    scene.add(fill);

    // Cargar STL (raw GitHub)
    const stlUrl = 'https://raw.githubusercontent.com/AMR-Autonomy-and-Research-Lab/amr1-tec-core/main/Dise%C3%B1o_CAJA/CajaNuevaAMRF2.STL';
    const loader = new STLLoader();

    loader.load(stlUrl, (geometry) => {
      geometry.center();
      geometry.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({ color: 0x4a7ac4, shininess: 30, specular: 0x4488ff });
      const mesh = new THREE.Mesh(geometry, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
    }, undefined, (err) => {
      console.error('Error cargando STL:', err);
      document.querySelector('header p').textContent = 'Error al cargar el modelo. Verifica la URL del STL.';
    });

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  </script>
</body>
</html>
