<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D de PCB - AMR1-TEC-CORE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b1121; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info { 
            position: absolute; top: 20px; width: 100%; text-align: center; color: #00f0ff; 
            pointer-events: none; z-index: 100; font-weight: bold; text-shadow: 0 0 10px rgba(0,240,255,0.5);
        }
        #loading {
            position: absolute; top: 50%; width: 100%; text-align: center; color: white;
            font-size: 20px; z-index: 101; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        canvas { display: block; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: #00f0ff;
            animation: spin 1s linear infinite; display: inline-block; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <!-- Incluir THREE.js y cargadores necesarios -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="info">Modelo Geométrico PCB 3D Interactiva<br/><span style="font-size:0.8em; color:#a0aab8;">(Haz clic y arrastra para rotar · Rueda del ratón para Zoom)</span></div>
    <div id="loading">
        <div class="spinner"></div><br/>
        Cargando la geometría 3D completa de la placa... (Puede tardar unos segundos dependiendo de la complejidad)
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Escena, cámara y renderizador
        const scene = new THREE.Scene();
        // Fondo oscuro espacial/tech
        scene.background = new THREE.Color(0x0b1121);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles de ratón
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true; // Empieza girando para el efecto WOW
        controls.autoRotateSpeed = 2.0;

        // Iluminación ultra estetica (Estilo Cyberpunk/Estudio fotográfico)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x0f1e38, 0.6);
        scene.add(hemiLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(20, 100, 50);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const blueLight = new THREE.PointLight(0x00aaff, 3, 300);
        blueLight.position.set(-50, 20, 50);
        scene.add(blueLight);

        const magentaLight = new THREE.PointLight(0xff0055, 1.5, 300);
        magentaLight.position.set(50, 40, -50);
        scene.add(magentaLight);

        let objectGroup = new THREE.Group();
        scene.add(objectGroup);

        // Cargadores
        const manager = new THREE.LoadingManager();
        manager.onLoad = function () {
            document.getElementById('loading').style.display = 'none';
        };

        manager.onProgress = function (item, loaded, total) {
            document.getElementById('loading').innerHTML = `<div class="spinner"></div><br/>Cargando: ${loaded} de ${total} componentes 3D...`;
        };

        const gltfLoader = new GLTFLoader(manager);
        gltfLoader.load('https://raw.githubusercontent.com/AMR-Autonomy-and-Research-Lab/amr1-tec-core/main/3D_Models/PCB_3D/PCB_Final.glb', function (gltf) {
            const object = gltf.scene;
            
            // Mejorar materiales PBR para que parezca fotorrealista (estilo PCBWay)
            object.traverse((child) => {
                if (child.isMesh && child.material) {
                    const mat = child.material;
                    mat.side = THREE.DoubleSide;
                    // Detectar de qué está hecho por su color
                    const r = mat.color.r, g = mat.color.g, b = mat.color.b;
                    
                    // Si es Verde (Tarjeta PCB Solder Mask)
                    if (g > r && g > b && g > 0.4) {
                        mat.roughness = 0.2; // Glossy
                        mat.metalness = 0.1;
                    } 
                    // Si es negro/gris oscuro (Chips de Silicio / Plástico)
                    else if (r < 0.25 && g < 0.25 && b < 0.25) {
                        mat.roughness = 0.6; // Plástico mate
                        mat.metalness = 0.0;
                    } 
                    // Si es Gris Claro / Metálico / Naranja Oscuro (Pines, Conectores, Soldadura)
                    else if ((r > 0.5 && g > 0.5 && b > 0.5) || (r > 0.6 && g < 0.5 && b < 0.3)) {
                        mat.roughness = 0.3; // Metálico pulido
                        mat.metalness = 0.9; // Muy metálico
                    }
                    // Si es Blanco (Serigrafía / Conectores)
                    else if (r > 0.9 && g > 0.9 && b > 0.9) {
                        mat.roughness = 0.8;
                        mat.metalness = 0.0;
                    }
                    else {
                        mat.roughness = 0.5; // Por defecto
                        mat.metalness = 0.1;
                    }
                }
            });

            // Escalar objeto hacia abajo (si es inmenso exportado de EasyEDA)
            object.scale.set(0.01, 0.01, 0.01);

            // Centrar objeto matemáticamente
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            object.position.x += (object.position.x - center.x);
            object.position.y += (object.position.y - center.y);
            object.position.z += (object.position.z - center.z);
            
            object.rotation.x = -Math.PI / 2;

            objectGroup.add(object);
            
            // Ajustar cámara
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim > 0) {
                camera.position.set(0, maxDim * 1.5, maxDim * 1.5);
            } else {
                camera.position.set(0, 50, 100);
            }
            controls.target.set(0, 0, 0);
        }, undefined, function (error) {
            console.error(error);
            document.getElementById('loading').innerHTML = "Error al cargar el modelo 3D.";
        });

        // Loop de renderizado
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario si hay damping o rotación automática
            renderer.render(scene, camera);
        }

        // Manejar redimensionamiento de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
