<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D de PCB - AMR1-TEC-CORE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b1121; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info { 
            position: absolute; top: 20px; width: 100%; text-align: center; color: #00f0ff; 
            pointer-events: none; z-index: 100; font-weight: bold; text-shadow: 0 0 10px rgba(0,240,255,0.5);
        }
        #loading {
            position: absolute; top: 50%; width: 100%; text-align: center; color: white;
            font-size: 20px; z-index: 101; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
        canvas { display: block; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: #00f0ff;
            animation: spin 1s linear infinite; display: inline-block; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <!-- Incluir THREE.js y cargadores necesarios -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="info">Modelo Geométrico PCB 3D Interactiva<br/><span style="font-size:0.8em; color:#a0aab8;">(Haz clic y arrastra para rotar · Rueda del ratón para Zoom)</span></div>
    <div id="loading">
        <div class="spinner"></div><br/>
        Cargando la geometría 3D completa de la placa... (Puede tardar unos segundos dependiendo de la complejidad)
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

        // Escena, cámara y renderizador
        const scene = new THREE.Scene();
        // Fondo oscuro espacial/tech
        scene.background = new THREE.Color(0x0b1121);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles de ratón
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true; // Empieza girando para el efecto WOW
        controls.autoRotateSpeed = 2.0;

        // Iluminación ultra estetica (Estilo Cyberpunk/Estudio)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(20, 100, 50);
        scene.add(directionalLight);

        const blueLight = new THREE.PointLight(0x00f0ff, 2, 200);
        blueLight.position.set(-50, 20, 50);
        scene.add(blueLight);

        const redLight = new THREE.PointLight(0xff0055, 1, 200);
        redLight.position.set(50, 20, -50);
        scene.add(redLight);

        let objectGroup = new THREE.Group();
        scene.add(objectGroup);

        // Cargadores
        const manager = new THREE.LoadingManager();
        manager.onLoad = function () {
            document.getElementById('loading').style.display = 'none';
        };

        manager.onProgress = function (item, loaded, total) {
            document.getElementById('loading').innerHTML = `<div class="spinner"></div><br/>Cargando: ${loaded} de ${total} componentes 3D...`;
        };

        const mtlLoader = new MTLLoader(manager);
        mtlLoader.setPath('../../3D_Models/PCB_3D/');
        mtlLoader.load('OBJ_PCB_Final.mtl', function (materials) {
            materials.preload();
            
            // Forzar que los materiales tengan un color base vistoso si fallan las texturas
            for (const mat in materials.materials) {
                materials.materials[mat].side = THREE.DoubleSide;
                materials.materials[mat].shininess = 50;
            }

            const objLoader = new OBJLoader(manager);
            objLoader.setMaterials(materials);
            objLoader.setPath('../../3D_Models/PCB_3D/');
            objLoader.load('OBJ_PCB_Final.obj', function (object) {
                // Escalar el objeto brutalmente hacia abajo porque EasyEDA exporta en miles de unidades (mm * 10 o similar)
                object.scale.set(0.01, 0.01, 0.01);

                // Centrar el objeto matemáticamente después de escalar
                const box = new THREE.Box3().setFromObject(object);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                object.position.x += (object.position.x - center.x);
                object.position.y += (object.position.y - center.y);
                object.position.z += (object.position.z - center.z);
                
                // Rotar para que se vea plana (normalmente vienen de pie desde EasyEDA)
                object.rotation.x = -Math.PI / 2;

                objectGroup.add(object);
                
                // Ajustar la cámara automáticamente basada en el tamaño real del objeto ya escalado
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(0, maxDim * 1.5, maxDim * 1.5);
                controls.target.set(0, 0, 0);
            });
        });

        // Loop de renderizado
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario si hay damping o rotación automática
            renderer.render(scene, camera);
        }

        // Manejar redimensionamiento de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
